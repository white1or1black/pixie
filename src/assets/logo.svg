<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pixie logo">
  <title>Pixie</title>
  <desc>A glowing pixie orb with two radiant wings and scattered pixie-dust sparks.</desc>

  <defs>
    <!-- soft background glow -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#6c63ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
    </radialGradient>

    <!-- wing gradient (right wing): root bright -> tip fades -->
    <linearGradient id="wingGrad" gradientUnits="userSpaceOnUse" x1="300" y1="282" x2="470" y2="92">
      <stop offset="0%" stop-color="#c8bdff"/>
      <stop offset="50%" stop-color="#7d72ff"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0.12"/>
    </linearGradient>

    <!-- wing gradient (left wing, mirrored direction) -->
    <linearGradient id="wingGradL" gradientUnits="userSpaceOnUse" x1="212" y1="282" x2="42" y2="92">
      <stop offset="0%" stop-color="#c8bdff"/>
      <stop offset="50%" stop-color="#7d72ff"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0.12"/>
    </linearGradient>

    <!-- core orb -->
    <radialGradient id="core" cx="46%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="32%" stop-color="#e7e1ff"/>
      <stop offset="72%" stop-color="#8b80ff"/>
      <stop offset="100%" stop-color="#5a52d5"/>
    </radialGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="micro" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <!-- reusable four-point pixie-dust spark -->
    <g id="spark">
      <path d="M0 -13L3.1 -3.1L13 0L3.1 3.1L0 13L-3.1 3.1L-13 0L-3.1 -3.1Z"
            fill="#b8acff" opacity="0.6" filter="url(#micro)"/>
      <path d="M0 -10L2.4 -2.4L10 0L2.4 2.4L0 10L-2.4 2.4L-10 0L-2.4 -2.4Z" fill="#ffffff"/>
    </g>
  </defs>

  <g id="pixie">
    <!-- ambient glow -->
    <circle cx="256" cy="256" r="214" fill="url(#halo)"/>

    <!-- wings: glow copies -->
    <path d="M322 244C380 168 440 128 468 92C444 176 388 248 318 272Z"
          fill="#6c63ff" opacity="0.5" filter="url(#soft)"/>
    <path d="M190 244C132 168 72 128 44 92C68 176 124 248 194 272Z"
          fill="#6c63ff" opacity="0.5" filter="url(#soft)"/>
    <!-- wings: bodies -->
    <path d="M322 244C380 168 440 128 468 92C444 176 388 248 318 272Z" fill="url(#wingGrad)"/>
    <path d="M190 244C132 168 72 128 44 92C68 176 124 248 194 272Z" fill="url(#wingGradL)"/>

    <!-- core orb + outer glow rings -->
    <circle cx="256" cy="256" r="74" fill="#6c63ff" opacity="0.2" filter="url(#soft)"/>
    <circle cx="256" cy="256" r="66" fill="url(#core)"/>
    <circle cx="256" cy="256" r="66" fill="none" stroke="#6c63ff" stroke-width="3" opacity="0.45"/>
    <!-- specular highlight -->
    <ellipse cx="238" cy="236" rx="20" ry="13" fill="#ffffff" opacity="0.8" filter="url(#micro)"/>

    <!-- pixie dust -->
    <use href="#spark" transform="translate(478 58)"/>
    <use href="#spark" transform="translate(34 58)"/>
    <use href="#spark" transform="translate(258 106) scale(0.62)"/>
    <use href="#spark" transform="translate(404 150) scale(0.5)"/>
    <use href="#spark" transform="translate(108 150) scale(0.5)"/>
  </g>
</svg>
