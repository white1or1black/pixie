name: release

# Triggered by pushing a tag like `app-v0.1.1`. Builds all three platforms,
# signs the installers with the Tauri updater key, and publishes a draft
# GitHub Release whose `latest.json` is auto-merged across the matrix jobs.
on:
  push:
    tags:
      - "app-v*"

jobs:
  # macOS builds must run sequentially (not in parallel) because tauri-action
  # manages the same draft Release + latest.json for both arches, and
  # concurrent uploads cause aarch64 artifacts to be silently lost.
  publish-macos:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend deps
        run: pnpm install

      - name: Determine release channel
        # A tag like app-v0.8.0-beta.1 → version "0.8.0-beta.1" → prerelease.
        # Stable users pull from /releases/latest/... which never resolves to a
        # GitHub prerelease, so betas never reach the stable channel.
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#app-v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
            echo "Channel: beta (prerelease $VERSION)"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
            echo "Channel: stable ($VERSION)"
          fi

      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: app-v__VERSION__
          releaseName: "Pixie v__VERSION__"
          releaseDraft: true
          prerelease: ${{ env.PRERELEASE }}
          args: --target ${{ matrix.target }}

  publish-other:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: pnpm install

      - name: Determine release channel
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#app-v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "PRERELEASE=true" >> "$GITHUB_ENV"
            echo "Channel: beta (prerelease $VERSION)"
          else
            echo "PRERELEASE=false" >> "$GITHUB_ENV"
            echo "Channel: stable ($VERSION)"
          fi

      - uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Pixie v__VERSION__"
          releaseDraft: true
          prerelease: ${{ env.PRERELEASE }}
          updaterJsonPreferNsis: true
          # Windows MSI rejects prerelease versions (e.g. 0.8.0-beta.1 — MSI
          # needs numeric-only). For prereleases, build Windows as NSIS only
          # (the updater already prefers NSIS anyway). Stable keeps MSI+NSIS.
          args: ${{ (matrix.platform == 'windows-latest' && env.PRERELEASE == 'true') && '--bundles nsis' || matrix.args }}